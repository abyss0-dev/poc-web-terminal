<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      background: #1e1e1e; color: #ddd;
      font: 14px/1.4 system-ui, sans-serif;
    }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 12px; background: #252526; border-bottom: 1px solid #333;
    }
    header h1 { font-size: 14px; margin: 0; font-weight: 600; }
    #targets { display: flex; gap: 8px; flex-wrap: wrap; }
    .target {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border: 1px solid #444; border-radius: 4px;
      background: #2d2d2d; cursor: pointer; user-select: none;
    }
    .target[disabled] { opacity: 0.45; cursor: not-allowed; }
    .target.active { border-color: #0a84ff; background: #0a3a66; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; }
    .dot.ready { background: #2ecc71; }
    .dot.booting { background: #f1c40f; }
    .dot.error { background: #e74c3c; }
    #status { margin-left: auto; color: #999; }
    #term-wrap { flex: 1; min-height: 0; position: relative; }
    #term { position: absolute; inset: 0; padding: 4px; }

    /* In-terminal search overlay (Ctrl+Shift+F) */
    #search {
      position: absolute; top: 8px; right: 16px; z-index: 20;
      display: none; align-items: center; gap: 6px;
      padding: 6px 8px; background: #252526; border: 1px solid #444;
      border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #search.open { display: flex; }
    #search input {
      width: 200px; padding: 4px 6px; border: 1px solid #555; border-radius: 4px;
      background: #1e1e1e; color: #ddd; font: 13px ui-monospace, monospace; outline: none;
    }
    #search input:focus { border-color: #0a84ff; }
    #search button {
      padding: 3px 8px; border: 1px solid #555; border-radius: 4px;
      background: #2d2d2d; color: #ddd; cursor: pointer; font-size: 13px; line-height: 1;
    }
    #search button:hover { background: #3a3a3a; }
    #search .count { color: #999; font-size: 12px; min-width: 64px; text-align: right; }

    /* Right-click context menu */
    #menu {
      position: absolute; z-index: 30; display: none; min-width: 150px;
      padding: 4px; background: #2a2a2b; border: 1px solid #454545;
      border-radius: 6px; box-shadow: 0 6px 22px rgba(0,0,0,0.55);
    }
    #menu.open { display: block; }
    #menu .item {
      display: flex; justify-content: space-between; gap: 16px;
      padding: 6px 10px; border-radius: 4px; cursor: pointer; user-select: none;
      font-size: 13px; color: #ddd;
    }
    #menu .item:hover { background: #0a3a66; }
    #menu .item[aria-disabled="true"] { opacity: 0.4; pointer-events: none; }
    #menu .item .key { color: #888; font-size: 12px; }
    #menu .sep { height: 1px; margin: 4px 6px; background: #444; }
  </style>
</head>
<body>
  <header>
    <h1>Web Terminal</h1>
    <div id="targets"></div>
    <span id="status">loading targets…</span>
  </header>
  <div id="term-wrap">
    <div id="term"></div>
    <div id="search">
      <input id="search-input" type="text" placeholder="Find" spellcheck="false" autocomplete="off" />
      <span class="count" id="search-count"></span>
      <button id="search-prev" title="Previous (Shift+Enter)">↑</button>
      <button id="search-next" title="Next (Enter)">↓</button>
      <button id="search-close" title="Close (Esc)">✕</button>
    </div>
    <div id="menu">
      <div class="item" data-action="copy"><span>Copy</span><span class="key">Ctrl+C</span></div>
      <div class="item" data-action="paste"><span>Paste</span><span class="key">Ctrl+V</span></div>
      <div class="sep"></div>
      <div class="item" data-action="selectAll"><span>Select All</span><span class="key">Ctrl+Shift+A</span></div>
      <div class="item" data-action="search"><span>Find…</span><span class="key">Ctrl+Shift+F</span></div>
      <div class="sep"></div>
      <div class="item" data-action="clear"><span>Clear</span></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15.0/lib/addon-search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8.0/lib/addon-unicode11.min.js"></script>
  <script>
    const targetsEl = document.getElementById("targets");
    const statusEl = document.getElementById("status");

    // A 16-colour ANSI palette so 256-colour / true-colour output reads cleanly.
    const term = new Terminal({
      cursorBlink: true,
      fontFamily: "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace",
      fontSize: 14,
      scrollback: 10000,
      allowProposedApi: true,      // search decorations / unicode11
      macOptionIsMeta: true,
      theme: {
        background: "#1e1e1e", foreground: "#d4d4d4",
        cursor: "#d4d4d4", cursorAccent: "#1e1e1e",
        selectionBackground: "#264f78", selectionForeground: "#ffffff",
        black: "#1e1e1e", red: "#f44747", green: "#6a9955", yellow: "#d7ba7d",
        blue: "#569cd6", magenta: "#c586c0", cyan: "#4ec9b0", white: "#d4d4d4",
        brightBlack: "#808080", brightRed: "#f44747", brightGreen: "#b5cea8",
        brightYellow: "#dcdcaa", brightBlue: "#9cdcfe", brightMagenta: "#c586c0",
        brightCyan: "#4ec9b0", brightWhite: "#ffffff",
      },
    });

    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.loadAddon(new WebLinksAddon.WebLinksAddon());
    const search = new SearchAddon.SearchAddon();
    term.loadAddon(search);
    const unicode11 = new Unicode11Addon.Unicode11Addon();
    term.loadAddon(unicode11);
    term.unicode.activeVersion = "11";

    term.open(document.getElementById("term"));

    // WebGL renderer with a graceful fall-back to the DOM renderer if the GPU
    // context is unavailable or lost (e.g. tab backgrounded on some drivers).
    try {
      const webgl = new WebglAddon.WebglAddon();
      webgl.onContextLoss(() => webgl.dispose());
      term.loadAddon(webgl);
    } catch (_) { /* DOM renderer remains active */ }

    fit.fit();

    let ws = null;
    let activeId = null;
    const encoder = new TextEncoder();

    function setStatus(text) { statusEl.textContent = text; }

    function sendResize() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      fit.fit();
      ws.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
    }

    function connect(id) {
      if (ws) { ws.close(); ws = null; }
      term.reset();
      activeId = id;
      renderTargets(lastTargets);

      const proto = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${proto}://${location.host}/ws?id=${encodeURIComponent(id)}`);
      ws.binaryType = "arraybuffer";

      ws.onopen = () => {
        setStatus(`connected: ${id}`);
        sendResize(); // first control frame syncs the remote PTY immediately
        term.focus();
      };
      ws.onmessage = (ev) => {
        if (typeof ev.data === "string") return; // control frames are browser→backend only
        term.write(new Uint8Array(ev.data));
      };
      ws.onclose = () => {
        setStatus(`disconnected: ${id}`);
        term.write("\r\n\x1b[2m[session closed]\x1b[0m\r\n");
        ws = null;
      };
      ws.onerror = () => setStatus(`error: ${id}`);
    }

    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(encoder.encode(data));
      }
    });

    window.addEventListener("resize", sendResize);

    // ---- Clipboard --------------------------------------------------------
    // The Clipboard API only works in a secure context (https or localhost);
    // over plain http to a LAN IP the browser blocks it, so we surface that.
    function flash(text) {
      const prev = statusEl.textContent;
      setStatus(text);
      setTimeout(() => { if (statusEl.textContent === text) setStatus(prev); }, 1200);
    }

    function copySelection() {
      const sel = term.getSelection();
      if (!sel) return false;
      if (!navigator.clipboard?.writeText) { flash("clipboard unavailable (needs https/localhost)"); return false; }
      navigator.clipboard.writeText(sel).then(() => flash("copied")).catch(() => flash("copy blocked"));
      return true;
    }

    async function pasteClipboard() {
      if (!navigator.clipboard?.readText) { flash("clipboard unavailable (needs https/localhost)"); return; }
      try {
        const text = await navigator.clipboard.readText();
        if (text) { term.paste(text); term.focus(); }   // routed through onData → WS
      } catch (_) { flash("paste blocked"); }
    }

    // ---- Search overlay ---------------------------------------------------
    const searchBox = document.getElementById("search");
    const searchInput = document.getElementById("search-input");
    const searchCount = document.getElementById("search-count");
    const searchOpts = {
      incremental: true,
      decorations: {
        matchBackground: "#5a4a00", matchOverviewRuler: "#d7ba7d",
        activeMatchBackground: "#f1c40f", activeMatchColorOverviewRuler: "#f1c40f",
      },
    };
    search.onDidChangeResults((r) => {
      if (!r || r.resultCount === undefined) { searchCount.textContent = ""; return; }
      if (!r.resultCount) { searchCount.textContent = "no match"; return; }
      searchCount.textContent = r.resultIndex >= 0
        ? `${r.resultIndex + 1}/${r.resultCount}` : `${r.resultCount}+`;
    });
    function openSearch() {
      searchBox.classList.add("open");
      searchInput.value = term.getSelection() || searchInput.value;
      searchInput.focus();
      searchInput.select();
      if (searchInput.value) search.findNext(searchInput.value, searchOpts);
    }
    function closeSearch() {
      searchBox.classList.remove("open");
      search.clearDecorations();
      searchCount.textContent = "";
      term.focus();
    }
    function toggleSearch() { searchBox.classList.contains("open") ? closeSearch() : openSearch(); }
    searchInput.addEventListener("input", () => search.findNext(searchInput.value, searchOpts));
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); e.shiftKey
        ? search.findPrevious(searchInput.value, searchOpts)
        : search.findNext(searchInput.value, searchOpts); }
      else if (e.key === "Escape") { e.preventDefault(); closeSearch(); }
    });
    document.getElementById("search-next").onclick = () => search.findNext(searchInput.value, searchOpts);
    document.getElementById("search-prev").onclick = () => search.findPrevious(searchInput.value, searchOpts);
    document.getElementById("search-close").onclick = closeSearch;

    // ---- Keyboard shortcuts ----------------------------------------------
    // Intercept clipboard / search chords before xterm forwards them to the PTY.
    term.attachCustomKeyEventHandler((e) => {
      if (e.type !== "keydown") return true;

      // Primary copy: Ctrl+C *with a selection* copies (then drops the
      // selection so a second Ctrl+C reaches the shell as SIGINT). Chrome
      // reserves Ctrl+Shift+C for DevTools, so it cannot be the copy key.
      // With no selection, Ctrl+C falls through untouched → shell SIGINT.
      if (e.ctrlKey && !e.shiftKey && !e.altKey && !e.metaKey && e.code === "KeyC") {
        if (term.hasSelection()) { copySelection(); term.clearSelection(); e.preventDefault(); return false; }
        return true;
      }

      // Chords: Cmd on macOS, or Ctrl+Shift elsewhere (Ctrl+Shift+C still works
      // in browsers that don't reserve it, e.g. Firefox).
      const chord = (e.ctrlKey && e.shiftKey) || (e.metaKey && !e.ctrlKey);
      if (!chord) return true;
      switch (e.code) {
        case "KeyC":
          if (term.hasSelection()) { copySelection(); e.preventDefault(); return false; }
          return true; // nothing selected: let the key through (e.g. Cmd+C no-op)
        case "KeyV": pasteClipboard(); e.preventDefault(); return false;
        case "KeyF": openSearch(); e.preventDefault(); return false;
        case "KeyA": term.selectAll(); e.preventDefault(); return false;
        default: return true;
      }
    });

    // ---- Right-click context menu ----------------------------------------
    const menu = document.getElementById("menu");
    const wrap = document.getElementById("term-wrap");
    function showMenu(x, y) {
      menu.querySelector('[data-action="copy"]').setAttribute("aria-disabled", String(!term.hasSelection()));
      menu.classList.add("open");
      const r = wrap.getBoundingClientRect();
      const mx = Math.min(x - r.left, r.width - menu.offsetWidth - 4);
      const my = Math.min(y - r.top, r.height - menu.offsetHeight - 4);
      menu.style.left = `${Math.max(0, mx)}px`;
      menu.style.top = `${Math.max(0, my)}px`;
    }
    function hideMenu() { menu.classList.remove("open"); }
    wrap.addEventListener("contextmenu", (e) => { e.preventDefault(); showMenu(e.clientX, e.clientY); });
    menu.addEventListener("click", (e) => {
      const item = e.target.closest(".item");
      if (!item) return;
      switch (item.dataset.action) {
        case "copy": copySelection(); break;
        case "paste": pasteClipboard(); break;
        case "selectAll": term.selectAll(); break;
        case "search": openSearch(); break;
        case "clear": term.clear(); break;
      }
      hideMenu();
    });
    document.addEventListener("click", (e) => { if (!menu.contains(e.target)) hideMenu(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") hideMenu(); });
    window.addEventListener("blur", hideMenu);

    // ---- Target picker ----------------------------------------------------
    let lastTargets = [];
    function renderTargets(targets) {
      lastTargets = targets;
      targetsEl.innerHTML = "";
      for (const t of targets) {
        const el = document.createElement("div");
        el.className = "target" + (t.id === activeId ? " active" : "");
        if (t.status !== "ready") el.setAttribute("disabled", "");
        el.innerHTML = `<span class="dot ${t.status}"></span><span>${t.label}</span>`;
        el.title = t.status;
        if (t.status === "ready") el.onclick = () => connect(t.id);
        targetsEl.appendChild(el);
      }
    }

    async function refreshTargets() {
      try {
        const res = await fetch("/api/targets");
        const targets = await res.json();
        renderTargets(targets);
        if (!activeId) {
          const ready = targets.filter((t) => t.status === "ready").length;
          setStatus(ready ? "select a target" : "targets booting…");
        }
      } catch (e) {
        setStatus("cannot reach BFF");
      }
    }

    refreshTargets();
    // Poll the fleet status on a fixed cadence; status keeps reflecting changes.
    setInterval(refreshTargets, 3000);
  </script>
</body>
</html>
